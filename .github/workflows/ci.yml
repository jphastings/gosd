name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$fmt_out"
            exit 1
          fi

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  smoke-build:
    name: cross-compile smoke build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      # The image-smoke-build job below now covers the full `gosd build`
      # path (board profiles landed with gosd-3zrc). This job stays as a
      # narrower, faster check that the pure-Go, no-root, arm64 cross-
      # compile path works for the binaries gosd assembles into images.
      - name: Cross-compile arm64 targets (CGO disabled)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/gosd-init ./examples/hello ./examples/usbserial ./examples/i2cscan ./examples/gpioinfo ./examples/spiloopback ./examples/emmcstorage
      # GOARM=6 is the pi-zero-w board's target (bean gosd-2j6z, keystone for
      # gosd-et0q): a narrower check than the arm64 one above, just proving
      # the 32-bit ARM cross-compile path works for the binaries every board
      # build needs, same as the arm64 check does for the other three boards.
      # examples/i2cscan, examples/gpioinfo, and examples/spiloopback are
      # included here too (beans gosd-85pt, gosd-nyad, gosd-fnza): all three
      # must build for every board, including the 32-bit pi-zero-w.
      - name: Cross-compile armv6 targets (CGO disabled)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=6 go build ./cmd/gosd-init ./examples/hello ./examples/i2cscan ./examples/gpioinfo ./examples/spiloopback ./examples/emmcstorage
      - name: Build gosd CLI for host
        run: go build ./cmd/gosd

  image-smoke-build:
    name: image smoke build (both boards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # Go module caching only: the artifact-download cache
          # (internal/artifacts, ~/.cache/gosd or platform equivalent) isn't
          # exercised here on purpose. This job builds against the committed
          # fake artifacts in cmd/gosd/testdata/fake-artifacts via
          # --artifacts-dir specifically so CI never needs network access or
          # a published artifacts/vX.Y.Z release to prove `gosd build`
          # works end to end; there is nothing for that cache to hold in
          # this job. A cache keyed on internal/artifacts.Version would only
          # be worth adding to a future job that builds from a real release.
          cache: true
      # Omitting --board builds every registered board (the repo's locked
      # "no --board builds all boards" decision), so one invocation smoke-
      # tests both pi-zero-2w and radxa-zero-3e. The .img read-back/content
      # assertions already live in cmd/gosd's `go test` integration tests
      # (TestBuildProducesABootableImageFromFakeArtifacts and its
      # radxa-zero-3e counterpart); this job only needs to prove the CLI
      # command itself exits 0 in CI.
      - name: gosd build ./examples/hello (all boards, fake artifacts)
        run: |
          mkdir -p dist
          go run ./cmd/gosd build ./examples/hello \
            --artifacts-dir cmd/gosd/testdata/fake-artifacts \
            --hostname ci-smoke-test \
            -o dist
      - name: Assert both board images were produced
        run: |
          for img in dist/hello-pi-zero-2w.img dist/hello-radxa-zero-3e.img; do
            if [ ! -s "$img" ]; then
              echo "expected non-empty image $img" >&2
              exit 1
            fi
          done

  qemu-boot:
    name: qemu boot-to-HTTP smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Unlike image-smoke-build (fake artifacts, no network on purpose),
      # this job exercises the REAL artifact path: no --artifacts-dir, so
      # `gosd build` downloads the qemu-virt kernel from the GitHub Release
      # pinned by internal/artifacts.Version. Until that release is
      # published, this job fails at the build step with the artifact
      # download error — that error names the missing release and is the
      # actionable signal, not a bug in this job.
      - name: Cache downloaded board artifacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/gosd/artifacts
          # internal/artifacts.Version pins which release gets downloaded,
          # so hashing the file that declares it keys the cache to exactly
          # that release: bumping the pinned version invalidates the cache.
          key: gosd-artifacts-${{ hashFiles('internal/artifacts/artifacts.go') }}
      - name: Install qemu
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends qemu-system-arm
          qemu-system-aarch64 --version
      - name: gosd build ./examples/hello --board=qemu-virt (real artifacts)
        run: |
          mkdir -p dist
          go run ./cmd/gosd build ./examples/hello \
            --board=qemu-virt \
            --hostname ci-qemu-hello \
            -o dist/hello-qemu-virt.img
      - name: Boot the image and poll until HTTP responds
        run: |
          ./scripts/qemu-run.sh dist/hello-qemu-virt.img > serial.log 2>&1 &
          runner_pid=$!

          # This runner is amd64, so qemu TCG-emulates arm64: boot takes
          # far longer than the ~3s of an arm64 host. 180s is generous
          # headroom, not an expectation.
          expected="host=ci-qemu-hello"
          success=0
          for i in $(seq 1 180); do
            if ! kill -0 "$runner_pid" 2>/dev/null; then
              echo "qemu-run.sh exited before HTTP ever responded" >&2
              break
            fi
            resp="$(curl -s -m 2 http://localhost:8080/ || true)"
            if [ -n "$resp" ] && echo "$resp" | grep -q "$expected"; then
              echo "boot-to-HTTP OK after ~${i}s: $resp"
              success=1
              break
            fi
            sleep 1
          done

          kill "$runner_pid" 2>/dev/null || true
          pkill -f qemu-system-aarch64 2>/dev/null || true

          if [ "$success" -ne 1 ]; then
            echo "::group::Captured serial log"
            cat serial.log
            echo "::endgroup::"
            echo "hello never responded with '$expected' on http://localhost:8080 within 180s" >&2
            exit 1
          fi
