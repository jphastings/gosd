name: Build artifacts

# Triggered by pushing a git tag matching artifacts/v*, e.g. artifacts/v0.1.0
# (see bean gosd-wtpa and docs/artifacts.md for the full release process), or
# manually via workflow_dispatch for testing on a branch (bean gosd-07fl) —
# a dispatch run skips the final publish step, see package-and-release below.
# Builds the kernel/DTB/bootloader files GoSD compiles itself for both
# end-user boards plus the internal-only qemu-virt board (CI/local boot
# testing, bean gosd-5wm0 — never shown in end-user docs or the default
# all-boards build), packages them into per-board tarballs + a
# manifest.json, and publishes a GitHub Release from them. Third-party
# blobs (GPU firmware, WiFi firmware, rkbin) are NOT built or re-hosted
# here — they stay upstream-fetched by the CLI at pinned URL+sha256, per
# the no-rehosting policy in the repo root CLAUDE.md.
#
# The kernel jobs run `gosd build-kernel` (bean gosd-07fl/epic
# gosd-47rm): it drives the same Dockerized, cross-compiling build the old
# per-board build.sh/docker-build.sh scripts used to run directly (retired
# by this same bean) from the Go-native internal/kernelspec source of truth,
# so the developer path (`gosd build-kernel` on a laptop) and the release
# path are the same code. Most builds are arm64 via the
# aarch64-linux-gnu- toolchain; pi-zero-w cross-compiles 32-bit armv6 via
# arm-linux-gnueabihf- (a true cross compile even on an arm64 host — see
# build/boards/pi-zero-w/README.md). None of them need an arm64 host or QEMU
# emulation, so they run unchanged on GitHub's amd64 ubuntu-latest runners,
# which have Docker preinstalled. The U-Boot jobs are unchanged: they
# still run their own build.sh/Dockerfile directly (U-Boot orchestration is
# out of scope for gosd-47rm).
on:
  push:
    tags:
      - "artifacts/v*"
  workflow_dispatch: {}

permissions:
  contents: write # required to publish a GitHub Release

jobs:
  pi-zero-2w-kernel:
    name: Build pi-zero-2w kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gosd build-kernel
        run: go run ./cmd/gosd build-kernel --board pi-zero-2w --staging staging/ -o out/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pi-zero-2w
          path: staging/pi-zero-2w
          if-no-files-found: error
          retention-days: 1

  pi-zero-w-kernel:
    name: Build pi-zero-w kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gosd build-kernel
        run: go run ./cmd/gosd build-kernel --board pi-zero-w --staging staging/ -o out/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pi-zero-w
          path: staging/pi-zero-w
          if-no-files-found: error
          retention-days: 1

  radxa-zero-3e-kernel:
    name: Build radxa-zero-3e kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gosd build-kernel
        run: go run ./cmd/gosd build-kernel --board radxa-zero-3e --staging staging/ -o out/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: radxa-zero-3e-kernel
          path: staging/radxa-zero-3e
          if-no-files-found: error
          retention-days: 1

  radxa-zero-3e-uboot:
    name: Build radxa-zero-3e U-Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/radxa-zero-3e/uboot/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: radxa-zero-3e-uboot
          path: |
            build/boards/radxa-zero-3e/uboot/out/idbloader.img
            build/boards/radxa-zero-3e/uboot/out/u-boot.itb
          if-no-files-found: error
          retention-days: 1

  nanopi-zero2-kernel:
    name: Build nanopi-zero2 kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gosd build-kernel
        run: go run ./cmd/gosd build-kernel --board nanopi-zero2 --staging staging/ -o out/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nanopi-zero2-kernel
          path: staging/nanopi-zero2
          if-no-files-found: error
          retention-days: 1

  # U-Boot pinned to a v2026.07-rc tag, not a final release yet — see
  # build/boards/nanopi-zero2/uboot/README.md's "This pins a release
  # candidate" note and bean gosd-f39b's amended gate.
  nanopi-zero2-uboot:
    name: Build nanopi-zero2 U-Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/nanopi-zero2/uboot/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nanopi-zero2-uboot
          path: |
            build/boards/nanopi-zero2/uboot/out/idbloader.img
            build/boards/nanopi-zero2/uboot/out/u-boot.itb
          if-no-files-found: error
          retention-days: 1

  # rock-4se is registered internal-only until its first artifacts release
  # activates it (epic gosd-cuym, activation bean gosd-h8a8); it's built and
  # packaged here so that release can carry it from day one.
  rock-4se-kernel:
    name: Build rock-4se kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gosd build-kernel
        run: go run ./cmd/gosd build-kernel --board rock-4se --staging staging/ -o out/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rock-4se-kernel
          path: staging/rock-4se
          if-no-files-found: error
          retention-days: 1

  # rock-4se's U-Boot needs no rkbin blobs: RK3399's DRAM init is
  # open-source in U-Boot's TPL and BL31 is compiled from mainline
  # Trusted-Firmware-A inside the same Dockerfile — see the board's
  # uboot/README.md (the template for future RK3399-class boards).
  rock-4se-uboot:
    name: Build rock-4se U-Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/rock-4se/uboot/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rock-4se-uboot
          path: |
            build/boards/rock-4se/uboot/out/idbloader.img
            build/boards/rock-4se/uboot/out/u-boot.itb
          if-no-files-found: error
          retention-days: 1

  # qemu-virt is an internal-only board (CI + local dev boot testing, see
  # bean gosd-5wm0 and the "qemu-virt board" locked decision in CLAUDE.md).
  # It is still packaged into the same release as the end-user boards so
  # gosd-27lz's qemu smoke test and local `--board=qemu-virt` builds can
  # fetch it via the normal internal/artifacts cache path — it's simply
  # never mentioned in end-user docs or the default all-boards build.
  qemu-virt-kernel:
    name: Build qemu-virt kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gosd build-kernel
        run: go run ./cmd/gosd build-kernel --board qemu-virt --staging staging/ -o out/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-virt-kernel
          path: staging/qemu-virt
          if-no-files-found: error
          retention-days: 1

  package-and-release:
    name: Package and publish release
    needs:
      [
        pi-zero-2w-kernel,
        pi-zero-w-kernel,
        radxa-zero-3e-kernel,
        radxa-zero-3e-uboot,
        nanopi-zero2-kernel,
        nanopi-zero2-uboot,
        rock-4se-kernel,
        rock-4se-uboot,
        qemu-virt-kernel,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/artifacts/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/artifacts/}" >>"$GITHUB_OUTPUT"
          else
            # workflow_dispatch (or any non-tag trigger): there's no real
            # artifacts/vX.Y.Z version, so use a dev-only label. The publish
            # step below only runs for a real artifacts/v* tag push, so this
            # value never becomes a real release name.
            echo "version=dev-${GITHUB_SHA:0:12}" >>"$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pi-zero-2w
          path: staging/pi-zero-2w

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pi-zero-w
          path: staging/pi-zero-w

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: radxa-zero-3e-kernel
          path: staging/radxa-zero-3e

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: radxa-zero-3e-uboot
          path: staging/radxa-zero-3e

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nanopi-zero2-kernel
          path: staging/nanopi-zero2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nanopi-zero2-uboot
          path: staging/nanopi-zero2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rock-4se-kernel
          path: staging/rock-4se

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rock-4se-uboot
          path: staging/rock-4se

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: qemu-virt-kernel
          path: staging/qemu-virt

      - name: Record U-Boot source provenance
        # gosd build-kernel already wrote each board's kernel source.json
        # entry (staging/<board>/source.json, downloaded above) — see
        # internal/kernelbuild/output.go. The Rockchip-family boards
        # additionally build U-Boot via the unchanged uboot/build.sh script,
        # which has no source.json of its own, so merge its pinned
        # repo/tag/config into the existing per-board source.json here. This
        # is the only provenance step build-kernel doesn't already cover;
        # the old grep-every-build.sh step it replaces is gone entirely.
        run: |
          radxa_uboot_tag=$(grep -oP '^UBOOT_TAG="\K[^"]+' build/boards/radxa-zero-3e/uboot/build.sh)
          nanopi_zero2_uboot_tag=$(grep -oP '^UBOOT_TAG="\K[^"]+' build/boards/nanopi-zero2/uboot/build.sh)
          rock_4se_uboot_tag=$(grep -oP '^UBOOT_TAG="\K[^"]+' build/boards/rock-4se/uboot/build.sh)

          jq --arg repo "https://github.com/u-boot/u-boot.git" --arg ref "$radxa_uboot_tag" \
            --arg config "build/boards/radxa-zero-3e/uboot/bootdelay0.config" \
            '.uboot = {repo: $repo, ref: $ref, config: $config}' \
            staging/radxa-zero-3e/source.json >staging/radxa-zero-3e/source.json.tmp
          mv staging/radxa-zero-3e/source.json.tmp staging/radxa-zero-3e/source.json

          jq --arg repo "https://github.com/u-boot/u-boot.git" --arg ref "$nanopi_zero2_uboot_tag" \
            --arg config "build/boards/nanopi-zero2/uboot/bootdelay0.config" \
            '.uboot = {repo: $repo, ref: $ref, config: $config}' \
            staging/nanopi-zero2/source.json >staging/nanopi-zero2/source.json.tmp
          mv staging/nanopi-zero2/source.json.tmp staging/nanopi-zero2/source.json

          # rock-4se additionally compiles TF-A from source (no rkbin blobs);
          # copy its pins from the board manifest so the released provenance
          # names the BL31's exact source too (GPL/BSD provenance parity with
          # the kernel and U-Boot entries).
          jq --arg repo "https://github.com/u-boot/u-boot.git" --arg ref "$rock_4se_uboot_tag" \
            --arg config "build/boards/rock-4se/uboot/bootdelay0.config" \
            --slurpfile board_manifest build/boards/rock-4se/manifest.json \
            '.uboot = {repo: $repo, ref: $ref, config: $config} | .tfa = $board_manifest[0].tfa' \
            staging/rock-4se/source.json >staging/rock-4se/source.json.tmp
          mv staging/rock-4se/source.json.tmp staging/rock-4se/source.json

      - name: Package tarballs and manifest.json
        run: build/artifacts/package.sh "${{ steps.version.outputs.version }}" staging dist

      - name: Publish GitHub Release
        # Only a real artifacts/v* tag push publishes a release. A
        # workflow_dispatch run (bean gosd-07fl's verification gate) exercises
        # every build/package step above without cutting a release.
        if: startsWith(github.ref, 'refs/tags/artifacts/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Artifacts ${{ steps.version.outputs.version }}"
          body: |
            CI-built kernels and U-Boot for GoSD's supported boards (bean gosd-wtpa).

            Every file's build source (upstream repo, pinned commit/tag, config
            path) is recorded per-board in manifest.json for GPL compliance; see
            docs/artifacts.md for how the CLI consumes this release.
          files: |
            dist/pi-zero-2w.tar.zst
            dist/pi-zero-w.tar.zst
            dist/radxa-zero-3e.tar.zst
            dist/nanopi-zero2.tar.zst
            dist/rock-4se.tar.zst
            dist/qemu-virt.tar.zst
            dist/manifest.json
          fail_on_unmatched_files: true

      - name: Upload dist/ for workflow_dispatch inspection
        # Not needed for a real tag-triggered release (the GitHub Release
        # above already has these), but a dispatch run has nowhere else to
        # surface the packaged output for the equivalence checks in
        # bean gosd-07fl.
        if: ${{ !startsWith(github.ref, 'refs/tags/artifacts/') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7
