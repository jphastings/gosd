name: Build artifacts

# Triggered by pushing a git tag matching artifacts/v*, e.g. artifacts/v0.1.0
# (see bean gosd-wtpa and docs/artifacts.md for the full release process).
# Builds the kernel/DTB/bootloader files GoSD compiles itself for both
# end-user boards plus the internal-only qemu-virt board (CI/local boot
# testing, bean gosd-5wm0 — never shown in end-user docs or the default
# all-boards build), packages them into per-board tarballs + a
# manifest.json, and publishes a GitHub Release from them. Third-party
# blobs (GPU firmware, WiFi firmware, rkbin) are NOT built or re-hosted
# here — they stay upstream-fetched by the CLI at pinned URL+sha256, per
# the no-rehosting policy in the repo root CLAUDE.md.
#
# Every build/boards/*/build.sh this workflow runs is Dockerized and cross-
# compiles — most for arm64 via the aarch64-linux-gnu- toolchain
# (crossbuild-essential-arm64), pi-zero-w for 32-bit armv6 via the
# arm-linux-gnueabihf- toolchain (crossbuild-essential-armhf, a true cross
# compile even on an arm64 host — see build/boards/pi-zero-w/README.md).
# None of them need an arm64 host or QEMU emulation, so they run unchanged on
# GitHub's amd64 ubuntu-latest runners.
on:
  push:
    tags:
      - "artifacts/v*"

permissions:
  contents: write # required to publish a GitHub Release

jobs:
  pi-zero-2w-kernel:
    name: Build pi-zero-2w kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/pi-zero-2w/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pi-zero-2w
          path: |
            build/boards/pi-zero-2w/out/kernel8.img
            build/boards/pi-zero-2w/out/bcm2710-rpi-zero-2-w.dtb
          if-no-files-found: error
          retention-days: 1

  pi-zero-w-kernel:
    name: Build pi-zero-w kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/pi-zero-w/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pi-zero-w
          path: |
            build/boards/pi-zero-w/out/kernel.img
            build/boards/pi-zero-w/out/bcm2835-rpi-zero-w.dtb
          if-no-files-found: error
          retention-days: 1

  radxa-zero-3e-kernel:
    name: Build radxa-zero-3e kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/radxa-zero-3e/kernel/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: radxa-zero-3e-kernel
          path: |
            build/boards/radxa-zero-3e/kernel/out/Image
            build/boards/radxa-zero-3e/kernel/out/rk3566-radxa-zero-3e.dtb
          if-no-files-found: error
          retention-days: 1

  radxa-zero-3e-uboot:
    name: Build radxa-zero-3e U-Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/radxa-zero-3e/uboot/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: radxa-zero-3e-uboot
          path: |
            build/boards/radxa-zero-3e/uboot/out/idbloader.img
            build/boards/radxa-zero-3e/uboot/out/u-boot.itb
          if-no-files-found: error
          retention-days: 1

  nanopi-zero2-kernel:
    name: Build nanopi-zero2 kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/nanopi-zero2/kernel/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nanopi-zero2-kernel
          path: |
            build/boards/nanopi-zero2/kernel/out/Image
            build/boards/nanopi-zero2/kernel/out/rk3528-nanopi-zero2.dtb
          if-no-files-found: error
          retention-days: 1

  # U-Boot pinned to a v2026.07-rc tag, not a final release yet — see
  # build/boards/nanopi-zero2/uboot/README.md's "This pins a release
  # candidate" note and bean gosd-f39b's amended gate.
  nanopi-zero2-uboot:
    name: Build nanopi-zero2 U-Boot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/nanopi-zero2/uboot/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nanopi-zero2-uboot
          path: |
            build/boards/nanopi-zero2/uboot/out/idbloader.img
            build/boards/nanopi-zero2/uboot/out/u-boot.itb
          if-no-files-found: error
          retention-days: 1

  # qemu-virt is an internal-only board (CI + local dev boot testing, see
  # bean gosd-5wm0 and the "qemu-virt board" locked decision in CLAUDE.md).
  # It is still packaged into the same release as the end-user boards so
  # gosd-27lz's qemu smoke test and local `--board=qemu-virt` builds can
  # fetch it via the normal internal/artifacts cache path — it's simply
  # never mentioned in end-user docs or the default all-boards build.
  qemu-virt-kernel:
    name: Build qemu-virt kernel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run build.sh
        run: build/boards/qemu-virt/kernel/build.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qemu-virt-kernel
          path: |
            build/boards/qemu-virt/kernel/out/Image
          if-no-files-found: error
          retention-days: 1

  package-and-release:
    name: Package and publish release
    needs:
      [
        pi-zero-2w-kernel,
        pi-zero-w-kernel,
        radxa-zero-3e-kernel,
        radxa-zero-3e-uboot,
        nanopi-zero2-kernel,
        nanopi-zero2-uboot,
        qemu-virt-kernel,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/artifacts/}"
          if [ "$tag" = "$GITHUB_REF" ]; then
            echo "error: unexpected ref $GITHUB_REF, expected refs/tags/artifacts/vX.Y.Z" >&2
            exit 1
          fi
          echo "version=$tag" >>"$GITHUB_OUTPUT"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pi-zero-2w
          path: staging/pi-zero-2w

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pi-zero-w
          path: staging/pi-zero-w

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: radxa-zero-3e-kernel
          path: staging/radxa-zero-3e

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: radxa-zero-3e-uboot
          path: staging/radxa-zero-3e

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nanopi-zero2-kernel
          path: staging/nanopi-zero2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nanopi-zero2-uboot
          path: staging/nanopi-zero2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: qemu-virt-kernel
          path: staging/qemu-virt

      - name: Record source provenance
        # Pulls the pinned repo/commit/tag each build.sh already hardcodes
        # (single source of truth) into a small source.json per board, which
        # package.sh copies verbatim into manifest.json's boards.<board>.
        # source — GPL compliance requires this alongside the config files
        # already committed at the paths named below.
        run: |
          pi_commit=$(grep -oP '^PINNED_COMMIT="\K[^"]+' build/boards/pi-zero-2w/build.sh)
          pi_zero_w_commit=$(grep -oP '^PINNED_COMMIT="\K[^"]+' build/boards/pi-zero-w/build.sh)
          radxa_kernel_tag=$(grep -oP '^KERNEL_TAG="\K[^"]+' build/boards/radxa-zero-3e/kernel/build.sh)
          radxa_uboot_tag=$(grep -oP '^UBOOT_TAG="\K[^"]+' build/boards/radxa-zero-3e/uboot/build.sh)
          nanopi_zero2_kernel_tag=$(grep -oP '^KERNEL_TAG="\K[^"]+' build/boards/nanopi-zero2/kernel/build.sh)
          nanopi_zero2_uboot_tag=$(grep -oP '^UBOOT_TAG="\K[^"]+' build/boards/nanopi-zero2/uboot/build.sh)
          qemu_virt_kernel_tag=$(grep -oP '^KERNEL_TAG="\K[^"]+' build/boards/qemu-virt/kernel/build.sh)

          jq -n --arg repo "https://github.com/raspberrypi/linux" --arg ref "$pi_commit" \
            --arg config "build/boards/pi-zero-2w/kernel.config" \
            '{kernel: {repo: $repo, ref: $ref, config: $config}}' \
            >staging/pi-zero-2w/source.json

          jq -n --arg repo "https://github.com/raspberrypi/linux" --arg ref "$pi_zero_w_commit" \
            --arg config "build/boards/pi-zero-w/kernel.config" \
            '{kernel: {repo: $repo, ref: $ref, config: $config}}' \
            >staging/pi-zero-w/source.json

          jq -n \
            --arg krepo "https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git" --arg kref "$radxa_kernel_tag" \
            --arg kconfig "build/boards/radxa-zero-3e/kernel/kernel.config" \
            --arg urepo "https://github.com/u-boot/u-boot.git" --arg uref "$radxa_uboot_tag" \
            --arg uconfig "build/boards/radxa-zero-3e/uboot/bootdelay0.config" \
            '{kernel: {repo: $krepo, ref: $kref, config: $kconfig}, uboot: {repo: $urepo, ref: $uref, config: $uconfig}}' \
            >staging/radxa-zero-3e/source.json

          jq -n \
            --arg krepo "https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git" --arg kref "$nanopi_zero2_kernel_tag" \
            --arg kconfig "build/boards/nanopi-zero2/kernel/kernel.config" \
            --arg urepo "https://github.com/u-boot/u-boot.git" --arg uref "$nanopi_zero2_uboot_tag" \
            --arg uconfig "build/boards/nanopi-zero2/uboot/bootdelay0.config" \
            '{kernel: {repo: $krepo, ref: $kref, config: $kconfig}, uboot: {repo: $urepo, ref: $uref, config: $uconfig}}' \
            >staging/nanopi-zero2/source.json

          jq -n --arg repo "https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git" --arg ref "$qemu_virt_kernel_tag" \
            --arg config "build/boards/qemu-virt/kernel/kernel.config" \
            '{kernel: {repo: $repo, ref: $ref, config: $config}}' \
            >staging/qemu-virt/source.json

      - name: Package tarballs and manifest.json
        run: build/artifacts/package.sh "${{ steps.version.outputs.version }}" staging dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Artifacts ${{ steps.version.outputs.version }}"
          body: |
            CI-built kernels and U-Boot for GoSD's supported boards (bean gosd-wtpa).

            Every file's build source (upstream repo, pinned commit/tag, config
            path) is recorded per-board in manifest.json for GPL compliance; see
            docs/artifacts.md for how the CLI consumes this release.
          files: |
            dist/pi-zero-2w.tar.zst
            dist/pi-zero-w.tar.zst
            dist/radxa-zero-3e.tar.zst
            dist/nanopi-zero2.tar.zst
            dist/qemu-virt.tar.zst
            dist/manifest.json
          fail_on_unmatched_files: true
